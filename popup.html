<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steam 壁纸工坊 · WallHub</title>
<link rel="stylesheet" href="assets/css/popup.css">
</head>
<body>

<header class="header">
  <div class="logo">Wallpaper Engine <span>Hub</span></div>
  <div class="search-wrap">
    <input class="search-input" type="text" id="searchInput" placeholder="搜索壁纸名称..." autocomplete="off">
    <button class="search-btn" id="searchBtn">Search</button>
  </div>
  <div class="srv-status"><span class="dot" id="dot"></span><span id="srvTxt">连接中...</span></div>
</header>

<!-- Filter Bar -->
<div class="filter-bar">
  <div class="fg">
    <span class="fl">排序依据</span>
    <select class="sel" id="sortSel">
      <option value="trend">最热门</option>
      <option value="mostrecent">最新</option>
      <option value="lastupdated">最后更新</option>
      <option value="totaluniquesubscribers">最多订阅</option>
    </select>
  </div>
  <!-- 时间：仅最热门时显示 -->
  <div class="fg" id="daysGrp">
    <span class="fl">时间</span>
    <select class="sel" id="daysSel">
      <option value="1">今天</option>
      <option value="7">一周</option>
      <option value="30" selected>30天</option>
      <option value="90">三个月</option>
      <option value="180">半年</option>
      <option value="365">1年</option>
      <option value="0">有史以来</option>
    </select>
  </div>
  <div class="fdiv"></div>
  <div class="fg">
    <span class="fl">类型</span>
    <select class="sel" id="typeSel">
      <option value="" selected>全部</option>
      <option value="Scene">场景 Scene</option>
      <option value="Video">视频 Video</option>
      <option value="Web">网站 Web</option>
      <option value="Application">应用 Application</option>
    </select>
  </div>
  <div class="fg">
    <span class="fl">年龄评级</span>
    <select class="sel" id="ratingSel">
      <option value="">全部</option>
      <option value="Everyone">全年龄 Everyone</option>
      <option value="Questionable">家长指导级 Questionable</option>
      <option value="Mature">限制成人级 Mature</option>
    </select>
  </div>
  <button class="filter-btn" id="filterBtn" onclick="openSB()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
    Genre 筛选 <span class="badge" id="fbadge">0</span>
  </button>
</div>

<!-- Sidebar -->
<div class="sb-ov" id="sbOv" onclick="closeSB()"></div>
<aside class="sidebar" id="sb">
  <div class="sb-head">
    <div class="sb-title">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      Genre 类型筛选
    </div>
    <button class="xbtn" onclick="closeSB()">×</button>
  </div>
  <div class="sb-body">
    <div class="sb-sec">
      <div class="sb-sec-title">Genre 风格筛选</div>
      <div class="genre-grid" id="genreGrid"></div>
    </div>
  </div>
  <div class="sb-foot">
    <button class="btn-s" id="genreToggleBtn" onclick="toggleGenresAll()">清除</button>
    <button class="btn-p" onclick="applyFilters()">应用筛选</button>
  </div>
</aside>

<!-- Main -->
<main class="main">
  <div class="sec-head">
    <div class="sec-info">
      <span class="sec-title">Steam 创意工坊壁纸</span>
      <span class="res-count" id="resCnt">加载中...</span>
    </div>
    <div class="view-tog">
      <button class="vbtn active" id="vgrid" onclick="setView('grid')" title="网格">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>
      <button class="vbtn" id="vlist" onclick="setView('list')" title="列表">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </div>
  <div id="wcon"></div>
  <div id="pgn" class="pagination"></div>
</main>

<!-- Modal -->
<div class="modal-ov" id="mOv" onclick="mOvClick(event)">
  <div class="modal">
    <div class="modal-head">
      <div>
        <div class="modal-title" id="mTitle"></div>
        <div class="modal-sub" id="mSub"></div>
      </div>
      <button class="xbtn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <img class="modal-img" id="mImg" src="" alt="">
      <div class="mstats" id="mStats"></div>
      <div class="modal-desc" id="mDesc"></div>
      <div class="modal-tags" id="mTags"></div>
      <div class="cmt-sec">
        <div class="cmt-title">💬 用户留言</div>
        <div class="cmt-list" id="mCmts">
          <div class="cmt-spin"><div class="spinner-sm"></div>加载留言中...</div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="modal-sub-btn" id="mSubBtn">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        订阅 / 下载壁纸
      </button>
      <a class="steam-link" id="mSteam" href="#" target="_blank">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Steam页面
      </a>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>

<script src="assets/js/utils.js"></script>
<script src="assets/js/popup.js"></script>
</body>
</html>
